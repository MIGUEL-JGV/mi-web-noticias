name: Actualizar Noticias

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python actualizar_noticias.py

      - name: Commit and push changes
        run: |
          if git diff --quiet noticias.json; then
            echo "No hay cambios en noticias.json"
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "GitHub Actions Bot"
            git add noticias.json
            git commit -m "Actualizar noticias - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Cambios pushados exitosamente"
          fi
          
      - name: Ejecutar script de extracción
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python actualizar_noticias.py